specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: AGCO Corporation
providerId: agco
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: AGCO Corporation
serviceCategory: Agriculture / Telematics
tags:
  - Agriculture
  - Farm Equipment
  - Telematics
  - IoT
  - FinOps
  - FOCUS
description: FOCUS-aligned FinOps shape for AGCO's AgCommand telematics. AGCO is an OEM; telematics
  access is bundled with equipment and dealer agreements rather than billed as a standalone API.
notes: No public pricing; meters reflect the contract dimensions used by AGCO dealers (equipment count,
  fleet size, telemetry feed type).
sources:
  - https://www.agcocorp.com/
billingModel:
  pricingCategory: OEM / Dealer Contract
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
focusColumns:
  ServiceName: AGCO AgCommand
  ServiceCategory: Agriculture / Telematics
  ProviderName: AGCO Corporation
  PublisherName: AGCO Corporation
  InvoiceIssuerName: AGCO Corporation
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: equipment_subscription
    description: Telemetry subscription per piece of connected AGCO equipment
    unit: equipment-month
    aggregation: sum
    dimensions:
      - brand
      - model
      - dealer
  - name: data_feed
    description: Telematics data-feed delivery to a customer system
    unit: feed
    aggregation: count
    dimensions:
      - feed_type
      - integration
principles:
  - name: Visibility
    description: Track AgCommand cost via the dealer's invoice and the AgCommand fleet portal; correlate
      with the equipment register so cost ties to specific machines.
  - name: Allocation
    description: Allocate cost by farm / business unit / equipment cohort using the equipment serial
      number as the allocation key.
  - name: Optimization
    description: Optimize by deactivating telemetry on idled or sold equipment, consolidating data feeds,
      and aligning telemetry scope with what fleet operations actually use.
  - name: Accountability
    description: Fleet operations or farm-management leadership owns the AgCommand subscription line;
      reviews typically align with the equipment lease or service-contract renewal cycle.
maintainers:
