naftiko: 1.0.0-alpha2
info:
  label: AGCO AgCommand API — Machines
  description: 'AGCO AgCommand API — Machines. 1 operations. Lead operation: AGCO List Machines. Self-contained Naftiko capability
    covering one Agco business surface.'
  tags:
  - Agco
  - Machines
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AGCO_API_KEY: AGCO_API_KEY
capability:
  consumes:
  - type: http
    namespace: agcommand-machines
    baseUri: https://api.agcocorp.com
    description: AGCO AgCommand API — Machines business capability. Self-contained, no shared references.
    resources:
    - name: machines
      path: /machines
      operations:
      - name: listmachines
        method: GET
        description: AGCO List Machines
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.AGCO_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: agcommand-machines-rest
    port: 8080
    description: REST adapter for AGCO AgCommand API — Machines. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/machines
      name: machines
      description: REST surface for machines.
      operations:
      - method: GET
        name: listmachines
        description: AGCO List Machines
        call: agcommand-machines.listmachines
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: agcommand-machines-mcp
    port: 9090
    transport: http
    description: MCP adapter for AGCO AgCommand API — Machines. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: agco-list-machines
      description: AGCO List Machines
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: agcommand-machines.listmachines
      outputParameters:
      - type: object
        mapping: $.
