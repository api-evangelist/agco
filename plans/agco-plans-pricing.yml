description: AGCO Corporation is an OEM (Massey Ferguson, Fendt, Valtra, Challenger, GSI). Its AgCommand
  telematics platform is bundled with eligible AGCO equipment and dealer programs rather than sold as
  a standalone public API. No public pricing list is published; access and any data-feed pricing are
  arranged through AGCO dealers and fleet-management agreements.
notes: AGCO does not publish list prices for AgCommand or related telematics APIs. Plan below is a
  placeholder reflecting the dealer/OEM contract model.
sources:
  - https://www.agcocorp.com/
plans:
  - id: agco-dealer-contract
    name: Dealer / OEM Contract
    type: enterprise
    description: AgCommand telematics access is provisioned through AGCO dealers as part of equipment
      sale, lease, or fleet-management agreements. Pricing depends on equipment, fleet size, and
      contract terms.
    entries:
      - label: Custom contract
        name: custom_contract
        type: subscription
        metric: contract
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: contact AGCO dealer
        userMultiplied: false
    elements:
      - name: AGCO AgCommand telematics data
      - name: Dealer-provisioned access
      - name: Fleet management portal
