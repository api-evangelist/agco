openapi: 3.1.0
info:
  title: AGCO AgCommand Locations Machines API
  description: The AGCO AgCommand API provides approved third-party developers with access to machine telemetry data from AGCO equipment. Enables building management dashboards and mobile apps that access real-time machine data including location, performance metrics, and diagnostics.
  version: '1.0'
servers:
- url: https://api.agcocorp.com
tags:
- name: Machines
  description: Access machine information and status.
paths:
  /machines:
    get:
      operationId: listMachines
      summary: AGCO List Machines
      description: Retrieves a list of AGCO machines associated with the authenticated account, including machine type, model, and connectivity status.
      tags:
      - Machines
      responses:
        '200':
          description: Success
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: Authorization
