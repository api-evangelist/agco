description: AGCO does not publish rate-limit documentation for AgCommand or related OEM telematics APIs.
  Access is granted through dealer / OEM contracts and any throughput limits are defined in those
  agreements.
notes: No public rate-limit documentation; placeholder pending direct vendor confirmation.
sources:
  - https://www.agcocorp.com/
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Contractual telematics throughput
    scope: contract
    metric: varies
    limit: defined per dealer / fleet contract
    notes: Telemetry frequency and fleet polling cadence are negotiated as part of the AgCommand
      provisioning agreement.
policies:
  - name: Backoff Strategy
    description: Clients should implement exponential backoff with jitter on throttling responses.
  - name: Contractual Limits
    description: Throughput, polling intervals, and concurrent connection limits are defined in the
      AgCommand customer agreement; contact your AGCO dealer to revise.
